
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тукан — Вход</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">
                <span class="logo-icon">🎯</span>
                <h1>Тукан</h1>
                <p class="subtitle">Ваш персональный органайзер</p>
            </div>
            <form action="/" method="get" class="login-form">
                <div class="form-group">
                    <label for="user_id">Ваш Telegram ID</label>
                    <input type="number" id="user_id" name="user_id" 
                           placeholder="Например: 123456789" required>
                    <small>
                        Не знаете свой ID? Напишите боту @userinfobot в Telegram
                    </small>
                </div>
                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            <div class="help-text">
                <p>Сначала отправьте любое сообщение <strong>боту</strong> в Telegram,<br>
                затем войдите по своему ID.</p>
            </div>
        </div>
    </div>
</body>
</html>
